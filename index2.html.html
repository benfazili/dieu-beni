<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Irumva Dieu Benny - Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: white;
      text-align: center;
      padding: 30px;
      margin: 0;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
    }
    .profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0066cc;
      margin-bottom: 20px;
    }
    h1 {
      color: #0066cc;
      margin: 10px 0;
    }
    p {
      font-size: 18px;
      color: #333;
    }
    .social-links {
      margin: 20px 0;
    }
    .btn {
      display: inline-block;
      margin: 5px;
      color: white;
      padding: 10px 16px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .btn-whatsapp { background-color: #25D366; }
    .btn-facebook { background-color: #1877F2; }
    .btn-instagram { background: #d6249f; background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
    .chat-box {
      width: 100%;
      margin: 30px auto;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #f9f9f9;
      padding: 15px;
      text-align: left;
    }
    .messages {
      height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      padding: 10px;
      margin-bottom: 10px;
      background: white;
    }
    input {
      width: 65%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      padding: 8px 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="ifoto-yanjye.jpg" alt="Ifoto ya Irumva Dieu Benny" class="profile-pic">
    <h1>Muraho! Ndi Irumva Dieu Benny</h1>
    <p>Uyu ni website yanjye bwite. Ndishimiye kukwakira hano.</p>
    
    <div class="social-links">
      <a class="btn btn-whatsapp" href="https://wa.me/250796908619">WhatsApp</a>
      <a class="btn btn-facebook" href="https://facebook.com/irumva.dieu.benny">Facebook</a>
      <a class="btn btn-instagram" href="https://instagram.com/irumva_dieu_beni">Instagram</a>
    </div>

    <div class="chat-box">
      <h3>Tuganire</h3>
      <div class="messages" id="messages"></div>
      <input type="text" id="msg" placeholder="Andika ubutumwa...">
      <button onclick="sendMsg()">Ohereza</button>
    </div>
  </div>

  <script>
    function sendMsg() {
      let msg = document.getElementById("msg").value;
      if(msg.trim() === "") return;
      let messages = document.getElementById("messages");
      messages.innerHTML += "<div><b>Wowe:</b> " + msg + "</div>";
      document.getElementById("msg").value = "";
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
